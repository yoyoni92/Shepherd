line-length = 100
target-version = "py312"
extend-exclude = ["templates"]

[lint]
select = ["E", "F", "I", "UP", "B"]
# str+Enum is intentional (pydantic-friendly serialization); we don't require StrEnum.
ignore = [
    "UP042",  # str+Enum is intentional (pydantic-friendly serialization); we don't require StrEnum.
    "B008",   # FastAPI Depends()/Header()/File() in default args is idiomatic dependency injection.
]
