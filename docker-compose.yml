# Shepherd - one compose, two environments (local dev / strong EC2 demo).
# Services are added here as they are built (Phase 1+). Postgres is the foundation.
services:
  postgres:
    build:
      context: ./db
      dockerfile: postgres.Dockerfile
    # pg_cron must be preloaded and pointed at the app DB for the kpi_daily schedule.
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=${POSTGRES_DB:-shepherd}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shepherd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shepherd}
      POSTGRES_DB: ${POSTGRES_DB:-shepherd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/roles.sql:/docker-entrypoint-initdb.d/01-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shepherd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    build: ./db
    command: sh entrypoint.sh
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  fleet-api:
    build:
      context: .
      dockerfile: services/fleet-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  channel-gateway:
    build:
      context: .
      dockerfile: services/channel-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/ingest}
      S3_BUCKET: ${S3_BUCKET:-shepherd-docs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "8001:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  doc-extractor:
    build:
      context: .
      dockerfile: services/doc-extractor/Dockerfile
    environment:
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-shepherd-docs}
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      EXTRACTOR_PROVIDER: ${EXTRACTOR_PROVIDER:-bedrock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8002:8002"
    depends_on:
      fleet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rag:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://rag_readonly:rag_readonly@postgres:5432/${POSTGRES_DB:-shepherd}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    ports:
      - "8004:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  langgraph-agent:
    build:
      context: .
      dockerfile: services/langgraph-agent/Dockerfile
    environment:
      FLEET_API_URL: http://fleet-api:8000
      RAG_URL: ${RAG_URL:-http://rag:8000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8003:8000"
    depends_on:
      fleet-api:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  guardrails:
    build:
      context: .
      dockerfile: services/guardrails/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://shepherd:shepherd@postgres:5432/shepherd}
      GUARDRAILS_API_KEY: ${GUARDRAILS_API_KEY:-}
      GUARDRAILS_LLM: ${GUARDRAILS_LLM:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webui:
    build:
      context: ./services/webui
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fleetops.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-shepherd}
      NEXT_PUBLIC_FLEET_API_URL: http://fleet-api:8000
      NEXT_PUBLIC_AGENT_URL: http://langgraph-agent:8000
      NEXT_PUBLIC_RAG_URL: http://rag:8000
      NEXT_PUBLIC_GATEWAY_URL: http://channel-gateway:8000
      NEXT_PUBLIC_ASSISTANT_URL: ${NEXT_PUBLIC_ASSISTANT_URL:-http://ollama-assistant:8000}
    ports:
      - "3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/auth/session || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    build:
      context: ./services/ollama
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-assistant:
    build:
      context: .
      dockerfile: services/ollama-assistant/Dockerfile
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      SYSTEM_PROMPT_PATH: /prompts/ollama_system.txt
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-60}
    ports:
      - "8006:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  ollama_data:
