# Shepherd - one compose, two environments (local dev / strong EC2 demo).
# Services are added here as they are built (Phase 1+). Postgres is the foundation.
# Pin the project name so containers/volumes are prefixed `dev-shepherd-` regardless of
# the (misspelled) directory name, which would otherwise derive `shepard`.
# This is the local-dev stack; a separate prod overlay would use its own name.
name: dev-shepherd
services:
  postgres:
    build:
      context: ./db
      dockerfile: postgres.Dockerfile
    # pg_cron must be preloaded and pointed at the app DB for the kpi_daily schedule.
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=${POSTGRES_DB:-shepherd}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shepherd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shepherd}
      POSTGRES_DB: ${POSTGRES_DB:-shepherd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/roles.sql:/docker-entrypoint-initdb.d/01-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shepherd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    build: ./db
    command: sh entrypoint.sh
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  fleet-api:
    build:
      context: .
      dockerfile: services/fleet-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ShepherdBot}
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  channel-gateway:
    build:
      context: .
      dockerfile: services/channel-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/ingest}
      S3_BUCKET: ${S3_BUCKET:-shepherd-docs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "8001:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  doc-extractor:
    build:
      context: .
      dockerfile: services/doc-extractor/Dockerfile
    environment:
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-shepherd-docs}
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      EXTRACTOR_PROVIDER: ${EXTRACTOR_PROVIDER:-bedrock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8002:8002"
    depends_on:
      fleet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rag:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://rag_readonly:rag_readonly@postgres:5432/${POSTGRES_DB:-shepherd}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    ports:
      - "8004:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  langgraph-agent:
    build:
      context: .
      dockerfile: services/langgraph-agent/Dockerfile
    environment:
      FLEET_API_URL: http://fleet-api:8000
      RAG_URL: ${RAG_URL:-http://rag:8000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8003:8000"
    depends_on:
      fleet-api:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  guardrails:
    build:
      context: .
      dockerfile: services/guardrails/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://shepherd:shepherd@postgres:5432/shepherd}
      GUARDRAILS_API_KEY: ${GUARDRAILS_API_KEY:-}
      GUARDRAILS_LLM: ${GUARDRAILS_LLM:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webui:
    build:
      context: ./services/webui
      dockerfile: Dockerfile
    environment:
      # Docker auto-sets HOSTNAME to the container id; Next's standalone server would bind to it
      # and refuse localhost (breaking the healthcheck). Pin it to all interfaces.
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fleetops.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-shepherd}
      # Server-only: the Fleet proxy injects the internal token; the generic proxy + health
      # aggregator reach the private services. None of these are exposed to the browser.
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      AGENT_URL: http://langgraph-agent:8000
      RAG_URL: http://rag:8000
      GATEWAY_URL: http://channel-gateway:8000
      ASSISTANT_URL: http://ollama-assistant:8000
    ports:
      - "3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      # 127.0.0.1, not localhost: inside the container localhost resolves to ::1 (IPv6),
      # but the standalone server binds IPv4 0.0.0.0 — the probe must hit 127.0.0.1.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/auth/session || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Invite-only Hebrew Telegram bot (replaces the n8n workflow). aiogram long-polling,
  # so no public HTTPS / tunnel is needed. Fleet API is its only tool layer.
  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ShepherdBot}
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      S3_BUCKET_ACCIDENTS: ${S3_BUCKET_ACCIDENTS:-shepherd-accidents}
      S3_BUCKET_DOCS: ${S3_BUCKET:-shepherd-docs}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      # LLM touches: Whisper (accident voice -> description), Gemini (admin doc scan).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      fleet-api:
        condition: service_healthy

  ollama:
    build:
      context: ./services/ollama
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      # the ollama image ships no curl/wget — use the bundled CLI (hits the local server)
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-assistant:
    build:
      context: .
      dockerfile: services/ollama-assistant/Dockerfile
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      SYSTEM_PROMPT_PATH: /prompts/ollama_system.txt
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-60}
    ports:
      - "8006:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  ollama_data:
