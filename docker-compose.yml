# Shepherd - one compose, two environments (local dev / strong EC2 demo).
# Services are added here as they are built (Phase 1+). Postgres is the foundation.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shepherd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shepherd}
      POSTGRES_DB: ${POSTGRES_DB:-shepherd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shepherd}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
