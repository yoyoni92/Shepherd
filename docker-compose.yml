# Shepherd - one compose, two environments (local dev / strong EC2 demo).
# Services are added here as they are built (Phase 1+). Postgres is the foundation.
# Pin the project name so containers/volumes are prefixed `dev-shepherd-` regardless of
# the (misspelled) directory name, which would otherwise derive `shepard`.
# This is the local-dev stack; a separate prod overlay would use its own name.
name: dev-shepherd
services:
  postgres:
    build:
      context: ./db
      dockerfile: postgres.Dockerfile
    # pg_cron must be preloaded and pointed at the app DB for the kpi_daily schedule.
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=${POSTGRES_DB:-shepherd}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shepherd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shepherd}
      POSTGRES_DB: ${POSTGRES_DB:-shepherd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/roles.sql:/docker-entrypoint-initdb.d/01-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shepherd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    build: ./db
    command: sh entrypoint.sh
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  fleet-api:
    build:
      context: .
      dockerfile: services/fleet-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ShepherdBot}
      # Google Drive storage (Fleet API owns uploads).
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gdrive-sa.json
      GDRIVE_FOLDER_ID: ${GDRIVE_FOLDER_ID:-}
    volumes:
      - ${GDRIVE_SA_KEY_PATH:-./secrets/gdrive-sa.json}:/run/secrets/gdrive-sa.json:ro
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  webui:
    build:
      context: ./services/webui
      dockerfile: Dockerfile
    environment:
      # Docker auto-sets HOSTNAME to the container id; Next's standalone server would bind to it
      # and refuse localhost (breaking the healthcheck). Pin it to all interfaces.
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Public: rendered as the plain t.me/<bot> link on the driver card. NEXT_PUBLIC_*
      # is inlined at build time, so a non-default bot name needs a rebuild.
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ShepherdBot}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fleetops.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-shepherd}
      # Server-only: the Fleet proxy injects the internal token. Not exposed to the browser.
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
    ports:
      - "3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      # 127.0.0.1, not localhost: inside the container localhost resolves to ::1 (IPv6),
      # but the standalone server binds IPv4 0.0.0.0 — the probe must hit 127.0.0.1.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/auth/session || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Invite-only Hebrew Telegram bot (replaces the n8n workflow). aiogram long-polling,
  # so no public HTTPS / tunnel is needed. Fleet API is its only tool layer.
  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ShepherdBot}
      FLEET_API_URL: http://fleet-api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-me}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-shepherd}:${POSTGRES_PASSWORD:-shepherd}@postgres:5432/${POSTGRES_DB:-shepherd}
      # Media uploads go through Fleet API (POST /files -> Google Drive); no object-store creds here.
      # LLM touches: Whisper (accident voice -> description), Gemini (admin doc scan).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      fleet-api:
        condition: service_healthy

volumes:
  pgdata:
