name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (a new PR push supersedes the previous one).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Image push authenticates to Docker Hub with repo secrets, not GITHUB_TOKEN, so read is enough.
permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of changed Python packages as Makefile SVC paths (webui excluded).
      packages: ${{ steps.pkgs.outputs.list }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # Filter keys ARE the Makefile SVC paths, so each leg runs `make ... SVC=<key>`
          # with no mapping. fleet-api's libs/** covers both contracts and shepherd_config;
          # the libs key negates shepherd_config so a config-only change does not run the
          # contracts leg; telegram-bot now depends on shepherd_config so it expands on
          # libs/shepherd_config/**.
          filters: |
            libs:
              - 'libs/**'
              - '!libs/shepherd_config/**'
            'libs/shepherd_config':
              - 'libs/shepherd_config/**'
            db:
              - 'db/**'
            'services/fleet-api':
              - 'services/fleet-api/**'
              - 'libs/**'
              - 'db/**'
            'services/telegram-bot':
              - 'services/telegram-bot/**'
              - 'libs/shepherd_config/**'
            webui:
              - 'services/webui/**'
      - id: pkgs
        # Drop webui from the changed set (it runs in its own npm job). jq array-difference
        # is the smallest available glue; no action does set subtraction. CHANGES is passed
        # via env (not inlined into the script) to avoid expression-injection warnings.
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: echo "list=$(jq -cn --argjson c "$CHANGES" '$c - ["webui"]')" >> "$GITHUB_OUTPUT"

  python:
    needs: detect
    # Empty array => no Python packages changed; skip rather than start an empty matrix.
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry
      # `make lint` runs `uvx ruff check .`; uvx ships with uv, which is not preinstalled.
      - run: pipx install uv
      - run: make install SVC=${{ matrix.package }}
      - run: make lint
      # make lint, typecheck, and test all pass for every package.
      - run: make typecheck SVC=${{ matrix.package }}
      - run: make test SVC=${{ matrix.package }}
