name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Manual deploy: ships the rotating secrets to the host and runs deploy.sh.
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (overrides TAG in the host .env). Blank keeps the current TAG."
        required: false
        default: ""

# Cancel superseded runs on the same ref (a new PR push supersedes the previous one).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default is read-only; the build-push job widens its own GITHUB_TOKEN to packages: write
# so it can push the private images to GHCR (ghcr.io). No registry secrets needed.
permissions:
  contents: read

jobs:
  python:
    # No path-filtering: every Python package runs lint + typecheck + test on every
    # push and PR, so all parties always show a result. The matrix values are the
    # Makefile SVC paths.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - libs
          - libs/shepherd_config
          - db
          - services/fleet-api
          - services/telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry
      # `make lint` runs `uvx ruff check .`; uvx ships with uv, which is not preinstalled.
      - run: pipx install uv
      - run: make install SVC=${{ matrix.package }}
      - id: lint
        run: make lint
      # make lint, typecheck, and test all pass for every package.
      - id: typecheck
        run: make typecheck SVC=${{ matrix.package }}
      - id: test
        run: make test SVC=${{ matrix.package }}
      - name: Summary
        if: always()
        env:
          PKG: ${{ matrix.package }}
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TEST: ${{ steps.test.outcome }}
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚪";; esac; }
          {
            echo "### 🐍 \`$PKG\`"
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| lint | $(icon "$LINT") ${LINT:-not run} |"
            echo "| typecheck | $(icon "$TYPECHECK") ${TYPECHECK:-not run} |"
            echo "| test | $(icon "$TEST") ${TEST:-not run} |"
          } >> "$GITHUB_STEP_SUMMARY"

  webui:
    # Always runs (no path-filtering) so the WebUI gate is always visible.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/webui/package-lock.json
      - run: npm ci
      - id: lint
        run: npm run lint
      - id: typecheck
        run: npm run typecheck
      - id: build
        run: npm run build
      - id: test
        run: npm test
      - name: Summary
        if: always()
        working-directory: .
        env:
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          BUILD: ${{ steps.build.outcome }}
          TEST: ${{ steps.test.outcome }}
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; skipped) echo "⏭️";; *) echo "⚪";; esac; }
          {
            echo "### 🌐 WebUI"
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| lint | $(icon "$LINT") ${LINT:-not run} |"
            echo "| typecheck | $(icon "$TYPECHECK") ${TYPECHECK:-not run} |"
            echo "| build | $(icon "$BUILD") ${BUILD:-not run} |"
            echo "| test | $(icon "$TEST") ${TEST:-not run} |"
          } >> "$GITHUB_STEP_SUMMARY"

  e2e:
    # Cross-service integration: boot the compose stack (Postgres + one-shot db-init
    # seed + Fleet API) and drive the real telegram-bot in-process against it. Only
    # Telegram and the LLM/S3 boundaries are mocked; the tests assert real DB rows.
    # No secrets needed - the stack runs on its compose defaults.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry
      # config.toml and secrets/ are git-ignored (local-only); without real files Docker
      # mounts a directory at each path. The committed example resolves its ${VAR}s from
      # the compose env; the gdrive placeholder is enough since e2e mocks Drive/LLM.
      - run: |
          cp config.example.toml config.toml
          mkdir -p secrets && echo '{}' > secrets/gdrive-sa.json
      # Build + start only what e2e needs; depends_on pulls in postgres and the
      # one-shot db-init (schema + seed) before Fleet API.
      - run: docker compose up -d --build fleet-api
      - name: Wait for Fleet API health
        run: |
          for _ in $(seq 1 30); do
            curl -fsS http://localhost:8000/health >/dev/null 2>&1 && { echo "fleet-api healthy"; exit 0; }
            sleep 5
          done
          echo "fleet-api did not become healthy" >&2
          docker compose logs --tail=200
          exit 1
      - run: make install SVC=tests/e2e
      - id: e2e
        run: make e2e
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail=300
      - name: Tear down
        if: always()
        run: docker compose down -v
      - name: Summary
        if: always()
        env:
          E2E: ${{ steps.e2e.outcome }}
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; *) echo "⏭️";; esac; }
          {
            echo "### 🔗 E2E (live stack)"
            echo "| Suite | Result |"
            echo "| --- | --- |"
            echo "| tests/e2e | $(icon "$E2E") ${E2E:-not run} |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-push:
    needs: [python, webui, e2e]
    # Publish only on push to main. !cancelled() && !failure() still guards against a
    # gate failure; with path-filtering gone every gate runs, so none are skipped.
    if: >-
      !cancelled() && !failure()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Widen GITHUB_TOKEN so the built-in token can push packages to GHCR.
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Contexts/Dockerfiles match docker-compose.yml. These images are exactly what
        # deploy/docker-compose.prod.yml (plan 03) pulls as ${REGISTRY}/shepherd-<svc>:${TAG}.
        include:
          - { svc: postgres, context: ./db, dockerfile: db/postgres.Dockerfile }
          - { svc: db-init, context: ., dockerfile: db/Dockerfile }
          - { svc: fleet-api, context: ., dockerfile: services/fleet-api/Dockerfile }
          - { svc: telegram-bot, context: ., dockerfile: services/telegram-bot/Dockerfile }
          - { svc: webui, context: ./services/webui, dockerfile: services/webui/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # GHCR via the built-in token. Pushed packages default to private and are
      # linked to this repo; no DOCKERHUB_* secrets needed.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR namespaces must be lowercase; the owner login can carry uppercase.
      - id: ns
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/shepherd-${{ matrix.svc }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ns.outputs.image }}:${{ github.sha }}
            ${{ steps.ns.outputs.image }}:latest
      - name: Summary
        if: success()
        env:
          IMAGE: ${{ steps.ns.outputs.image }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "### 📦 Pushed \`$IMAGE\`"
            echo "- \`$IMAGE:${SHA}\`"
            echo "- \`$IMAGE:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    # Manual-only (workflow_dispatch). Injects the rotating secrets into the host's
    # deploy/.env (and the Drive service-account JSON) over SSH at runtime, then runs
    # deploy.sh. Secrets live only in GitHub + the host's git-ignored files, never in
    # a pushed image. The host must already hold deploy/ with the REST of .env
    # (REGISTRY, TAG, DB creds, INTERNAL_SERVICE_TOKEN, AUTH/NEXTAUTH secrets, ADMIN_*),
    # config.toml, and a completed `docker login`. This step ships only the three
    # rotating secrets: TELEGRAM_BOT_TOKEN, GEMINI_API_KEY, and the Drive SA key.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Stage secret files
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Base64 of the Drive service-account JSON (base64 -w0 sa.json).
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON }}
          TAG: ${{ inputs.tag }}
        run: |
          umask 077
          # Fragment of .env lines to upsert on the host. Only the rotating secrets
          # (plus TAG when an override was supplied via the dispatch input).
          : > env.fragment
          printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN" >> env.fragment
          printf 'GEMINI_API_KEY=%s\n'     "$GEMINI_API_KEY"     >> env.fragment
          [ -n "$TAG" ] && printf 'TAG=%s\n' "$TAG" >> env.fragment
          printf '%s' "$GDRIVE_SA_JSON_B64" | base64 -d > gdrive-sa.json
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Ship secrets and deploy
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          # Path to the deploy/ folder on the host, relative to the SSH user's home
          # (or absolute). Defaults to ~/deploy.
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'deploy' }}
        run: |
          SSH=(ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST")
          # Stage the secret files in a transient dir, then merge + deploy remotely.
          "${SSH[@]}" "rm -rf ~/.shepherd-stage && mkdir -m700 -p ~/.shepherd-stage '$DEPLOY_PATH/secrets'"
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            env.fragment gdrive-sa.json "$SSH_USER@$SSH_HOST:~/.shepherd-stage/"
          "${SSH[@]}" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          cd "$DEPLOY_PATH"
          [ -f .env ] || { echo "ERROR: $DEPLOY_PATH/.env missing - seed the host .env first" >&2; exit 1; }
          # Upsert each fragment line into .env (replace existing key, else append).
          while IFS='=' read -r k v; do
            [ -z "$k" ] && continue
            tmp=$(mktemp)
            grep -v "^${k}=" .env > "$tmp" || true
            printf '%s=%s\n' "$k" "$v" >> "$tmp"
            mv "$tmp" .env
          done < ~/.shepherd-stage/env.fragment
          install -m600 ~/.shepherd-stage/gdrive-sa.json secrets/gdrive-sa.json
          rm -rf ~/.shepherd-stage
          ./deploy.sh
          REMOTE
      - name: Summary
        if: always()
        env:
          TAG: ${{ inputs.tag }}
          RESULT: ${{ job.status }}
        run: |
          {
            echo "## 🚀 Deploy ($RESULT)"
            echo
            echo "- Tag: \`${TAG:-(kept host's current TAG)}\`"
            echo "- Injected secrets: \`TELEGRAM_BOT_TOKEN\`, \`GEMINI_API_KEY\`, Drive SA JSON"
            echo "- Ran \`deploy.sh\` on the host"
          } >> "$GITHUB_STEP_SUMMARY"
