name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (a new PR push supersedes the previous one).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Image push authenticates to Docker Hub with repo secrets, not GITHUB_TOKEN, so read is enough.
permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
