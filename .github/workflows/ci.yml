name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Manual deploy: ships the rotating secrets to the host and runs deploy.sh.
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (overrides TAG in the host .env). Blank keeps the current TAG."
        required: false
        default: ""

# Cancel superseded runs on the same ref (a new PR push supersedes the previous one).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Image push authenticates to Docker Hub with repo secrets, not GITHUB_TOKEN, so read is enough.
permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of changed Python packages as Makefile SVC paths (webui excluded).
      packages: ${{ steps.pkgs.outputs.list }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # Filter keys ARE the Makefile SVC paths, so each leg runs `make ... SVC=<key>`
          # with no mapping. fleet-api's libs/** covers both contracts and shepherd_config;
          # the libs key negates shepherd_config so a config-only change does not run the
          # contracts leg; telegram-bot now depends on shepherd_config so it expands on
          # libs/shepherd_config/**.
          filters: |
            libs:
              - 'libs/**'
              - '!libs/shepherd_config/**'
            'libs/shepherd_config':
              - 'libs/shepherd_config/**'
            db:
              - 'db/**'
            'services/fleet-api':
              - 'services/fleet-api/**'
              - 'libs/**'
              - 'db/**'
            'services/telegram-bot':
              - 'services/telegram-bot/**'
              - 'libs/shepherd_config/**'
            webui:
              - 'services/webui/**'
      - id: pkgs
        # Drop webui from the changed set (it runs in its own npm job). jq array-difference
        # is the smallest available glue; no action does set subtraction. CHANGES is passed
        # via env (not inlined into the script) to avoid expression-injection warnings.
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: echo "list=$(jq -cn --argjson c "$CHANGES" '$c - ["webui"]')" >> "$GITHUB_OUTPUT"

  python:
    needs: detect
    # Empty array => no Python packages changed; skip rather than start an empty matrix.
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry
      # `make lint` runs `uvx ruff check .`; uvx ships with uv, which is not preinstalled.
      - run: pipx install uv
      - run: make install SVC=${{ matrix.package }}
      - run: make lint
      # make lint, typecheck, and test all pass for every package.
      - run: make typecheck SVC=${{ matrix.package }}
      - run: make test SVC=${{ matrix.package }}

  webui:
    needs: detect
    if: needs.detect.outputs.webui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/webui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  build-push:
    needs: [detect, python, webui]
    # Publish only on push to main. !cancelled() && !failure() lets this run when a quality
    # leg was skipped (unchanged package) while still blocking on an actual gate failure.
    if: >-
      !cancelled() && !failure()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Contexts/Dockerfiles match docker-compose.yml. These images are exactly what
        # deploy/docker-compose.prod.yml (plan 03) pulls as ${REGISTRY}/shepherd-<svc>:${TAG}.
        include:
          - { svc: postgres, context: ./db, dockerfile: db/postgres.Dockerfile }
          - { svc: db-init, context: ., dockerfile: db/Dockerfile }
          - { svc: fleet-api, context: ., dockerfile: services/fleet-api/Dockerfile }
          - { svc: telegram-bot, context: ., dockerfile: services/telegram-bot/Dockerfile }
          - { svc: webui, context: ./services/webui, dockerfile: services/webui/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ vars.DOCKERHUB_ORG }}/shepherd-${{ matrix.svc }}:${{ github.sha }}
            ${{ vars.DOCKERHUB_ORG }}/shepherd-${{ matrix.svc }}:latest

  deploy:
    # Manual-only (workflow_dispatch). Injects the rotating secrets into the host's
    # deploy/.env (and the Drive service-account JSON) over SSH at runtime, then runs
    # deploy.sh. Secrets live only in GitHub + the host's git-ignored files, never in
    # a pushed image. The host must already hold deploy/ with the REST of .env
    # (REGISTRY, TAG, DB creds, INTERNAL_SERVICE_TOKEN, AUTH/NEXTAUTH secrets, ADMIN_*),
    # config.toml, and a completed `docker login`. This step ships only the three
    # rotating secrets: TELEGRAM_BOT_TOKEN, GEMINI_API_KEY, and the Drive SA key.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Stage secret files
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Base64 of the Drive service-account JSON (base64 -w0 sa.json).
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON }}
          TAG: ${{ inputs.tag }}
        run: |
          umask 077
          # Fragment of .env lines to upsert on the host. Only the rotating secrets
          # (plus TAG when an override was supplied via the dispatch input).
          : > env.fragment
          printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN" >> env.fragment
          printf 'GEMINI_API_KEY=%s\n'     "$GEMINI_API_KEY"     >> env.fragment
          [ -n "$TAG" ] && printf 'TAG=%s\n' "$TAG" >> env.fragment
          printf '%s' "$GDRIVE_SA_JSON_B64" | base64 -d > gdrive-sa.json
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Ship secrets and deploy
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          # Path to the deploy/ folder on the host, relative to the SSH user's home
          # (or absolute). Defaults to ~/deploy.
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'deploy' }}
        run: |
          SSH=(ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST")
          # Stage the secret files in a transient dir, then merge + deploy remotely.
          "${SSH[@]}" "rm -rf ~/.shepherd-stage && mkdir -m700 -p ~/.shepherd-stage '$DEPLOY_PATH/secrets'"
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            env.fragment gdrive-sa.json "$SSH_USER@$SSH_HOST:~/.shepherd-stage/"
          "${SSH[@]}" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          umask 077
          cd "$DEPLOY_PATH"
          [ -f .env ] || { echo "ERROR: $DEPLOY_PATH/.env missing - seed the host .env first" >&2; exit 1; }
          # Upsert each fragment line into .env (replace existing key, else append).
          while IFS='=' read -r k v; do
            [ -z "$k" ] && continue
            tmp=$(mktemp)
            grep -v "^${k}=" .env > "$tmp" || true
            printf '%s=%s\n' "$k" "$v" >> "$tmp"
            mv "$tmp" .env
          done < ~/.shepherd-stage/env.fragment
          install -m600 ~/.shepherd-stage/gdrive-sa.json secrets/gdrive-sa.json
          rm -rf ~/.shepherd-stage
          ./deploy.sh
          REMOTE
